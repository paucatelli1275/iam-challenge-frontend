<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAM Challenge — Panel de acceso</title>
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0e14;
      --panel: #15171f;
      --panel-border: #262936;
      --text: #f0f1f5;
      --text-dim: #8d92a3;
      --accent: #7c5cff;
      --accent-glow: rgba(124, 92, 255, 0.25);
      --teal: #2dd4bf;
      --ok: #34d399;
      --ok-dim: rgba(52, 211, 153, 0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 15% -10%, rgba(124, 92, 255, 0.18), transparent 45%),
        radial-gradient(circle at 100% 110%, rgba(45, 212, 191, 0.12), transparent 45%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 34px 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .icon-wrap {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .icon-wrap svg {
      width: 22px;
      height: 22px;
      stroke: white;
    }

    h1 {
      font-size: 21px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    p.subtitle {
      color: var(--text-dim);
      font-size: 13.5px;
      margin-top: 6px;
      line-height: 1.5;
    }

    .mfa-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--teal);
      background: rgba(45, 212, 191, 0.1);
      border: 1px solid rgba(45, 212, 191, 0.25);
      border-radius: 999px;
      padding: 5px 12px;
      margin-top: 14px;
    }

    .divider {
      height: 1px;
      background: var(--panel-border);
      margin: 24px 0;
    }

    .session {
      display: none;
      background: var(--ok-dim);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .session .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 3px 0;
    }

    .session .row span:first-child {
      color: var(--text-dim);
    }

    .session .row span:last-child {
      color: var(--ok);
      font-weight: 600;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      border-radius: 11px;
      padding: 13px 18px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:active:not(:disabled) {
      transform: scale(0.99);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.3;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6a4ce0);
      color: white;
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.92;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--panel-border);
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: var(--teal);
      color: var(--teal);
    }

    #status {
      #status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 12px;
      background: #0a0b10;
      border: 1px solid var(--panel-border);
      white-space: pre-wrap;
      word-break: break-all;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 11px;
      line-height: 1.4;
      color: var(--text-dim);
      display: none;
      max-height: 80px;
      overflow-y: auto;
    }
    }

    footer {
      margin-top: 24px;
      font-size: 11.5px;
      color: var(--text-dim);
      text-align: center;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2 4 5v6c0 5 3.4 9 8 11 4.6-2 8-6 8-11V5l-8-3Z"/>
        <path d="m9 12 2 2 4-4"/>
      </svg>
    </div>

    <h1>Panel de acceso</h1>
    <p class="subtitle">IAM Challenge API — Mercado Libre, Seguridad Informática.</p>

    <div class="mfa-pill">🔐 Verificación en dos pasos activa</div>

    <div class="divider"></div>

    <div class="session" id="userInfo"></div>

    <div class="actions">
      <button class="btn-primary" id="btn-login">Iniciar sesión</button>
      <button class="btn-secondary" id="btn-call-api" disabled>Probar endpoint protegido</button>
      <button class="btn-secondary" id="btn-logout" disabled>Cerrar sesión</button>
    </div>

    <div id="status"></div>

    <footer>Powered by Auth0 · NestJS · Render</footer>
  </div>

  <script>
    const AUTH0_DOMAIN = "dev-18zentdrraf2jz3f.us.auth0.com";
    const AUTH0_CLIENT_ID = "7BC0qGdL5l1qdvMeJ8GvaR2yKRDoElEZ";
    const API_BASE_URL = "https://iam-challenge-api-iy0q.onrender.com";

    let auth0Client = null;

    const statusEl = document.getElementById("status");
    const userInfoEl = document.getElementById("userInfo");
    const btnLogin = document.getElementById("btn-login");
    const btnLogout = document.getElementById("btn-logout");
    const btnCallApi = document.getElementById("btn-call-api");

    function log(text) {
      statusEl.style.display = "block";
      statusEl.textContent = text;
    }

    async function initAuth0() {
      auth0Client = await auth0.createAuth0Client({
  domain: AUTH0_DOMAIN,
  clientId: AUTH0_CLIENT_ID,
  authorizationParams: {
    redirect_uri: window.location.origin,
    audience: "https://iam-challenge-api",
  },
});

      const query = window.location.search;
      if (query.includes("code=") && query.includes("state=")) {
        await auth0Client.handleRedirectCallback();
        window.history.replaceState({}, document.title, "/");
      }

      await updateUI();
    }

    async function updateUI() {
      const isAuthenticated = await auth0Client.isAuthenticated();

      btnLogin.disabled = isAuthenticated;
      btnLogout.disabled = !isAuthenticated;
      btnCallApi.disabled = !isAuthenticated;

      if (isAuthenticated) {
        const user = await auth0Client.getUser();
        userInfoEl.style.display = "block";
        userInfoEl.innerHTML = `
          <div class="row"><span>Sesión</span><span>● Activa</span></div>
          <div class="row"><span>Usuario</span><span>${user.email || user.sub}</span></div>
        `;
      } else {
        userInfoEl.style.display = "none";
        statusEl.style.display = "none";
      }
    }

    btnLogin.addEventListener("click", async () => {
  await auth0Client.loginWithRedirect({
    authorizationParams: {
      prompt: "login",
    },
  });
});

btnLogout.addEventListener("click", async () => {
  await auth0Client.logout({
    openUrl: false,
  });
  window.location.reload();
});

btnCallApi.addEventListener("click", async () => {
      try {
        const token = await auth0Client.getTokenSilently();
        log("Llamando a " + API_BASE_URL + "/protected ...");

        const response = await fetch(`${API_BASE_URL}/protected`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await response.json();
      
        statusEl.style.display = "block";
        statusEl.innerHTML = `
          <div style="margin-bottom:4px">Status: ${response.status}</div>
          <pre style="margin-bottom:4px">${JSON.stringify(data, null, 2)}</pre>
          <div style="margin-bottom:4px">✅ Token JWT válido (${token.length} caracteres)</div>
          <button onclick="navigator.clipboard.writeText(\`${token}\`).then(() => { this.textContent = '✅ Copiado!'; setTimeout(() => this.textContent = '📋 Copiar token para Swagger', 2000); })" 
            style="background:#2dd4bf;color:#0b0d12;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;">
            📋 Copiar token para Swagger
          </button>
        `;
      } catch (error) {
        log("Error: " + error.message);
      }
    });

    initAuth0();
  </script>
</body>
</html>
